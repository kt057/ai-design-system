name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Lint, type-check, build, test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v6

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install chromium --with-deps

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Type-check
        run: pnpm typecheck

      - name: Build (library + manifest)
        run: pnpm build

      - name: Verify manifest is up to date
        run: |
          if [ -n "$(git status --porcelain components.json)" ]; then
            echo "::error::components.json is out of date. Run 'pnpm build:manifest' and commit the result."
            git diff components.json
            exit 1
          fi

      - name: Test (vitest)
        run: pnpm test
